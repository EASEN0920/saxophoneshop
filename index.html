    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "TK SAXOPHONE",
      "url": "https://tksaxophone.com/",
      "image": "https://i.imgur.com/3jRKwrH.jpeg",
      "description": "TK SAXOPHONE 提供台製薩克斯風、Alto／Tenor 型號、吹嘴與配件選購，結合后里工藝與現場試吹體驗，協助初學者與進階演奏者找到適合自己的樂器。",
      "telephone": "0911-375938",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "404臺中市北區一中街116巷28號",
        "addressLocality": "Taichung",
        "addressCountry": "TW"
      },
      "brand": {
        "@type": "Brand",
        "name": "TK SAXOPHONE"
      }
    }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;300;400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fafaf9; }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-soft { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.05); } }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 連結與 API 管理
        const LINE_GENERAL = 'https://lin.ee/F8b9DOB';
        const LINE_LESSONS = 'https://lin.ee/0eYWepl';
        const SHOPIFY_DOMAIN = 'tk-saxophone.myshopify.com';
        const SHOPIFY_TOKEN = '6992f8d32d2f2b395e09519c2760f80f';

        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const iconName = name.charAt(0).toLowerCase() + name.slice(1).replace(/[A-Z]/g, l => `-${l.toLowerCase()}`);
                    iconRef.current.setAttribute('data-lucide', iconName);
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i ref={iconRef} style={{ width: size, height: size, display: 'inline-block' }} className={className}></i>;
        };

        // --- 子組件：藝術家卡片 ---
        const ArtistCard = ({ tag, name, desc, img }) => (
            <div className="relative group bg-stone-800/50 rounded-[40px] overflow-hidden flex flex-col shadow-2xl text-left">
                <div className="h-[500px] w-full bg-stone-900">
                    <img src={img} alt={`${name} - TK SAXOPHONE`} className="w-full h-full object-contain object-bottom transition duration-1000 group-hover:scale-105" />
                </div>
                <div className="absolute inset-x-0 bottom-0 p-10 bg-gradient-to-t from-stone-950 via-stone-950/60 to-transparent">
                    <span className="text-[10px] font-black text-amber-500 tracking-[0.4em] uppercase mb-3 block italic">{tag}</span>
                    <h4 className="text-4xl font-black mb-4 italic text-white">{name}</h4>
                    <p className="text-stone-300 font-light max-w-sm">{desc}</p>
                </div>
            </div>
        );

        // --- 子組件：師資卡片 ---
        const TeacherCard = ({ name, title, img, exp, edu, quote }) => (
            <div className="bg-white rounded-[3rem] shadow-xl overflow-hidden border border-stone-100 flex flex-col md:flex-row items-stretch transition hover:shadow-2xl duration-700 text-left">
                <div className="md:w-1/3 bg-stone-950 flex items-center justify-center overflow-hidden">
                    <img src={img} className="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-700" alt={name} />
                </div>
                <div className="md:w-2/3 p-8 md:p-12 space-y-8">
                    <div>
                        <h4 className="text-4xl font-black text-stone-900 mb-2 italic">{name}</h4>
                        <p className="text-xl font-bold text-stone-400 italic">{title}</p>
                    </div>
                    {quote && <div className="bg-stone-50 p-6 rounded-3xl border-l-4 border-amber-500 italic text-stone-600">{quote}</div>}
                    <div className="grid md:grid-cols-2 gap-8">
                        <div><h5 className="font-black italic text-stone-900 mb-4 border-b-2 border-amber-500 w-fit pb-1">專業經歷</h5><p className="text-sm text-stone-500 leading-relaxed">{exp}</p></div>
                        <div><h5 className="font-black italic text-stone-900 mb-4 border-b-2 border-amber-500 w-fit pb-1">學術背景</h5><p className="text-sm text-stone-500 leading-relaxed">{edu}</p></div>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [products, setProducts] = useState([]);
            const [newsArticles, setNewsArticles] = useState([]);
            const [loading, setLoading] = useState(true);
            const [newsLoading, setNewsLoading] = useState(true);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            const activeLineLink = currentPage === 'lessons' ? LINE_LESSONS : LINE_GENERAL;

            useEffect(() => {
                const fetchShopifyData = async () => {
                    const gqlQuery = `
                    {
                      products(first: 20) {
                        edges {
                          node {
                            id title handle
                            priceRange { minVariantPrice { amount } }
                            images(first: 1) { edges { node { url } } }
                          }
                        }
                      }
                      articles(first: 20) {
                        edges {
                          node {
                            id title handle publishedAt contentHtml
                            blog { handle title }
                          }
                        }
                      }
                    }`;

                    try {
                        const response = await fetch(`https://${SHOPIFY_DOMAIN}/api/2024-01/graphql.json`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': SHOPIFY_TOKEN },
                            body: JSON.stringify({ query: gqlQuery }),
                        });
                        const result = await response.json();
                        if (result.data) {
                            setProducts(result.data.products.edges.map(edge => ({
                                id: edge.node.id,
                                name: edge.node.title,
                                price: edge.node.priceRange.minVariantPrice.amount,
                                img: edge.node.images.edges[0]?.node.url || 'https://i.imgur.com/f3sTY2J.jpeg',
                                url: `https://${SHOPIFY_DOMAIN}/products/${edge.node.handle}`,
                                hidePrice: edge.node.title.includes('傳奇') || edge.node.title.includes('雅柏')
                            })));

                            const fetchedArticles = result.data.articles.edges.map(edge => ({
                                id: edge.node.id,
                                title: edge.node.title,
                                rawDate: edge.node.publishedAt,
                                date: new Date(edge.node.publishedAt).toLocaleDateString('zh-TW'),
                                excerpt: edge.node.contentHtml.replace(/<[^>]*>?/gm, '').substring(0, 100) + '...',
                                url: `https://${SHOPIFY_DOMAIN}/blogs/${edge.node.blog.handle}/${edge.node.handle}`,
                                category: edge.node.blog.title
                            }));

                            fetchedArticles.sort((a, b) => new Date(b.rawDate) - new Date(a.rawDate));
                            setNewsArticles(fetchedArticles);
                        }
                    } catch (e) { 
                        console.error(e); 
                    } finally { 
                        setLoading(false); 
                        setNewsLoading(false); 
                    }
                };
                fetchShopifyData();
            }, []);

            const changePage = (page) => { 
                setCurrentPage(page); 
                setIsSidebarOpen(false); 
                window.scrollTo(0, 0); 
            };

            const SidebarItem = ({ id, label }) => (
                <button onClick={() => changePage(id)} className={`text-xl font-bold tracking-widest uppercase text-left py-4 border-b border-stone-800 ${currentPage === id ? 'text-amber-500' : 'text-stone-300 hover:text-white'}`}>
                    {label}
                </button>
            );

            return (
                <div className="min-h-screen flex flex-col bg-stone-50 text-left">
                    <header>
                        <nav className="fixed w-full z-50 bg-stone-900/95 text-white backdrop-blur-md border-b border-stone-800 shadow-xl">
                            <div className="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center text-left">
                                <div className="flex items-center gap-4 cursor-pointer" onClick={() => changePage('home')}>
                                    <img src="https://i.imgur.com/H7NWyZP.png" alt="TK SAXOPHONE Logo" className="h-10 w-auto" />
                                    <div className="flex flex-col border-l border-stone-700 pl-4 leading-tight">
                                        <span className="text-xl font-bold tracking-widest text-amber-500 italic uppercase">TK SAXOPHONE</span>
                                        <span className="text-[9px] tracking-[0.2em] text-stone-400 font-bold uppercase mt-1 text-nowrap">台製薩克斯風 | 后里傳承</span>
                                    </div>
                                </div>
                                
                                <div className="hidden lg:flex space-x-8 text-xs font-bold tracking-widest uppercase text-left">
                                    <button onClick={() => changePage('home')} className={currentPage === 'home' ? 'text-amber-500 underline decoration-2 underline-offset-8' : 'hover:text-amber-400 transition'}>首頁</button>
                                    <button onClick={() => changePage('news')} className={currentPage === 'news' ? 'text-amber-500 underline decoration-2 underline-offset-8' : 'hover:text-amber-400 transition'}>最新消息</button>
                                    <button onClick={() => changePage('lessons')} className={currentPage === 'lessons' ? 'text-amber-500 underline decoration-2 underline-offset-8' : 'hover:text-amber-400 transition'}>教學課程</button>
                                    <button onClick={() => changePage('about')} className={currentPage === 'about' ? 'text-amber-500 underline decoration-2 underline-offset-8' : 'hover:text-amber-400 transition'}>品牌簡介</button>
                                    <button onClick={() => changePage('products')} className={currentPage === 'products' ? 'text-amber-500 underline decoration-2 underline-offset-8' : 'hover:text-amber-400 transition'}>產品系列</button>
                                    <button onClick={() => changePage('service')} className={currentPage === 'service' ? 'text-amber-500 underline decoration-2 underline-offset-8' : 'hover:text-amber-400 transition'}>售後服務</button>
                                </div>

                                <div className="flex items-center gap-4 text-left">
                                    <a href={`https://${SHOPIFY_DOMAIN}`} target="_blank" rel="noopener noreferrer" className="hidden md:flex bg-amber-600 hover:bg-amber-700 px-4 py-2 rounded-full font-black text-white text-[10px] shadow-lg items-center gap-2">
                                        <LucideIcon name="ShoppingCart" size={16} /> 進入商城
                                    </a>
                                    <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden p-2 text-stone-400 hover:text-white">
                                        <LucideIcon name="Menu" size={28} />
                                    </button>
                                </div>
                            </div>
                        </nav>
                    </header>

                    {isSidebarOpen && <div className="fixed inset-0 bg-black/60 z-[60] backdrop-blur-sm" onClick={() => setIsSidebarOpen(false)}></div>}
                    <aside className={`fixed top-0 right-0 h-full w-72 bg-stone-900 z-[70] shadow-2xl sidebar-transition transform ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex flex-col h-full p-8 text-left">
                            <div className="flex justify-between items-center mb-12">
                                <span className="text-amber-500 font-bold tracking-widest uppercase italic">功能導覽</span>
                                <button onClick={() => setIsSidebarOpen(false)} className="text-stone-400 hover:text-white"><LucideIcon name="X" size={28} /></button>
                            </div>
                            <nav className="flex flex-col">
                                {['home', 'news', 'lessons', 'about', 'products', 'service'].map(id => (
                                    <SidebarItem key={id} id={id} label={id === 'home' ? '首頁' : id === 'news' ? '最新消息' : id === 'lessons' ? '教學課程' : id === 'about' ? '品牌簡介' : id === 'products' ? '產品系列' : '售後服務'} />
                                ))}
                                <SidebarItem id="shipping" label="運送政策" />
                                <SidebarItem id="return" label="退換貨政策" />
                            </nav>
                        </div>
                    </aside>

                    <main className="pt-20 flex-1">
                        {currentPage === 'home' && <HomePage onExplore={() => changePage('products')} />}
                        {currentPage === 'news' && <NewsPage articles={newsArticles} loading={newsLoading} />}
                        {currentPage === 'lessons' && <LessonsPage />}
                        {currentPage === 'about' && <AboutSection />}
                        {currentPage === 'products' && <ProductsPage products={products} loading={loading} />}
                        {currentPage === 'service' && <ServicePage />}
                        {currentPage === 'shipping' && <PolicyPage title="運送政策 Shipping Policy" content="一般配件與耗材：於 TK SAXOPHONE 官網購買之配件、耗材類商品，依系統標示之基本運費計算。樂器類商品：限於「一中旗艦店」現場訂購，運費依配送方式實報實銷。" />}
                        {currentPage === 'return' && <PolicyPage title="退換貨政策 Return Policy" content="享有商品到貨次日起七天內之鑑賞期（非試用期）。因樂器屬衛生考量之商品，吹嘴類商品拆封後除非瑕疵恕不接受退換。" />}
                    </main>

                    <footer className="bg-stone-950 text-stone-500 py-16 text-left mt-auto">
                        <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-4 gap-12 text-left">
                            <div className="col-span-2 text-left">
                                <div className="flex items-center gap-4 mb-6">
                                    <img src="https://i.imgur.com/H7NWyZP.png" alt="TK Logo Footer" className="h-8 opacity-90" />
                                    <span className="text-xl font-bold tracking-widest text-white italic uppercase">TK SAXOPHONE</span>
                                </div>
                                <p className="text-sm leading-relaxed max-w-sm">八十年，我們只專心做好一件事：製作與靈魂共鳴的薩克斯風。傳承后里張連昌工藝，堅持 100% 台灣製造。</p>
                            </div>
                            <div className="text-left">
                                <h4 className="text-white font-bold text-sm tracking-widest uppercase mb-6">聯繫資訊</h4>
                                <div className="space-y-4 text-xs">
                                    <p className="flex items-start gap-2 leading-relaxed"><LucideIcon name="MapPin" size={16} className="text-amber-500" /> TK SAXOPHONE 台中一中旗艦店<br/>404臺中市北區一中街116巷28號</p>
                                    <p className="flex items-start gap-2 font-bold text-stone-300"><LucideIcon name="Phone" size={16} className="text-amber-500" /> 0911-375938 Easen</p>
                                </div>
                            </div>
                            <div className="text-left">
                                <h4 className="text-white font-bold text-sm tracking-widest uppercase mb-6">顧客服務</h4>
                                <ul className="space-y-4 text-xs font-light">
                                    <li><button onClick={() => changePage('shipping')} className="hover:text-amber-500 transition">運送政策 Shipping</button></li>
                                    <li><button onClick={() => changePage('return')} className="hover:text-amber-500 transition">退換貨政策 Return</button></li>
                                </ul>
                            </div>
                        </div>
                    </footer>

                    {/* LINE 懸浮按鈕：根據當前頁面自動切換連結 */}
                    <a href={activeLineLink} target="_blank" rel="noopener noreferrer" className="fixed bottom-8 right-8 z-[100] flex items-center gap-3 bg-[#06C755] text-white px-6 py-4 rounded-full shadow-2xl hover:bg-[#05b34c] transition-all transform hover:scale-105 group pulse-soft">
                        <svg viewBox="0 0 24 24" className="w-6 h-6 fill-current"><path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.083.922.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975 1.425-1.594 2.547-3.834 2.547-5.968zm-14.587 3.858c0 .428-.347.775-.775.775h-3.136c-.428 0-.775-.347-.775-.775v-6.223c0-.428.347-.775.775-.775s.775.347.775.775v5.448h2.361c.428 0 .775.347.775.775zm3.109 0c0 .428-.347.775-.775.775s-.775-.347-.775-.775v-6.223c0-.428.347-.775.775-.775s.775.347.775.775v6.223zm6.347 0c0 .428-.347.775-.775.775h-3.136c-.428 0-.775-.347-.775-.775v-6.223c0-.428.347-.775.775-.775s.775.347.775.775v5.448h2.361c.428 0 .775.347.775.775zm2.744-2.583c0 .428-.347.775-.775.775h-2.361v.775h2.361c.428 0 .775.347.775.775s-.347.775-.775.775h-3.136c-.428 0-.775-.347-.775-.775v-6.223c0-.428.347-.775.775-.775h3.136c.428 0 .775.347.775.775s-.347.775-.775.775h-2.361v.775h2.361c.428 0 .775.347.775.775z"/></svg>
                        <span className="font-bold tracking-widest text-sm whitespace-nowrap">LINE 即時諮詢</span>
                    </a>
                </div>
            );
        };

        const HomePage = ({ onExplore }) => (
            <div className="animate-fade-in text-left">
                <section className="relative h-[90vh] flex items-center overflow-hidden">
                    <div className="absolute inset-0 text-left">
                        <img src="https://i.imgur.com/3jRKwrH.jpeg" className="w-full h-full object-cover shadow-2xl" alt="TK SAXOPHONE 台中薩克斯風旗艦店" />
                        <div className="absolute inset-0 bg-stone-950/40"></div>
                    </div>
                    <div className="relative max-w-7xl mx-auto px-6 w-full text-left">
                        <div className="max-w-4xl space-y-8">
                            <div className="inline-block py-1 px-3 bg-amber-600 text-white text-[10px] font-black tracking-[0.4em] uppercase rounded shadow-lg text-left">Since 1946 Legacy</div>
                            <h1 className="text-6xl md:text-7xl font-black text-white leading-tight italic drop-shadow-2xl text-left">
                                TK SAXOPHONE
                                <span className="text-amber-500 text-4xl md:text-6xl block mt-4 text-left">
                                    台製薩克斯風・吹嘴・配件選購
                                </span>
                            </h1>
                            <p className="text-xl text-stone-100 font-light max-w-2xl leading-relaxed text-left">
                                提供 Alto／Tenor 薩克斯風、吹嘴與配件選購，結合后里工藝與現場試吹體驗，
                                協助初學者與進階演奏者找到適合自己的樂器。
                            </p>
                            <button onClick={onExplore} className="px-10 py-5 bg-amber-600 text-white rounded-full font-black hover:bg-amber-700 transition shadow-2xl uppercase tracking-widest text-xs flex items-center gap-2 text-left">查看旗艦產品 <LucideIcon name="ChevronRight" size={18} /></button>
                        </div>
                    </div>
                </section>

                <section className="py-24 bg-stone-900 text-white text-left">
                    <div className="max-w-7xl mx-auto px-6 text-left">
                        <div className="text-center mb-20">
                            <h2 className="text-4xl font-black italic mb-4 tracking-tight uppercase">國際演奏家之選</h2>
                            <p className="text-stone-500 text-sm tracking-[0.2em] uppercase italic font-bold">Trusted by World-Class Artists</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12 text-left">
                            <ArtistCard tag="Official Endorser" name="陳嘉俊 (Wilson Chen)" desc="其個人專屬「嘉」Model 系列在全球爵士圈享有盛譽。" img="https://i.imgur.com/QsOg9vX.jpeg" />
                            <ArtistCard tag="Saxophone Queen" name="小林香織 (Kaori Kobayashi)" desc="多次巡迴演出指定使用 TK 系列產品。" img="https://i.imgur.com/MgniwDh.jpeg" />
                        </div>
                    </div>
                </section>

                <section className="py-24 bg-white text-center">
                    <div className="max-w-7xl mx-auto px-6 mb-16 text-center">
                        <h2 className="text-4xl font-black italic mb-2 tracking-tight text-stone-900">精緻工藝細節</h2>
                        <div className="w-16 h-1 bg-amber-500 mx-auto mt-4"></div>
                    </div>
